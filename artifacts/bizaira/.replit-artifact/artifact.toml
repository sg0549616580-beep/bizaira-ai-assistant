kind = "web"
previewPath = "/"
title = "Bizaira AI Assistant"
version = "1.0.0"
id = "artifacts/bizaira"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23584

[services.development]
run = "pnpm --filter @workspace/bizaira run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bizaira", "run", "build" ]
publicDir = "artifacts/bizaira/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23584"
BASE_PATH = "/"
